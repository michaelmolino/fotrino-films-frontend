server {
    listen 4000;
    listen [::]:4000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_static on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }
}