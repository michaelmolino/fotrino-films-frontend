<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="description" content="Fotrino Films - The video host for friends and family." />
  <meta name="format-detection" content="telephone=no,date=no,address=no,email=yes" />
  <meta name="msapplication-tap-highlight" content="no" />
  <meta name="robots" content="noindex" />
  <meta name="viewport" content="initial-scale=1, minimum-scale=1, width=device-width" />

  <title>Fotrino Films</title>

  <!-- OpenGraph Tags -->
  <meta property="og:title" content="Fotrino Films" />
  <meta property="og:description" content="The video host for friends and family." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Fotrino Films" />

  <!-- Preconnect for faster resource loading -->
  <link rel="preconnect" href="https://films.fotrino.com" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="128x128" href="icons/favicon-128x128.png">
  <link rel="icon" type="image/png" sizes="96x96" href="icons/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png">
  <link rel="icon" type="image/ico" href="favicon.ico">

  <!-- Inline critical styles (migrated from src/css/app.sass) to avoid a render-blocking request -->
  <style>
    body {
      font-family:
        system-ui,
        -apple-system,
        Segoe UI,
        Roboto,
        Helvetica,
        Arial,
        'Apple Color Emoji',
        'Segoe UI Emoji',
        'Segoe UI Symbol',
        sans-serif;
      margin: 0;
      padding: 0;
    }

    .width250 {
      width: 250px;
    }

    .width480 {
      max-width: 480px;
    }

    .width720 {
      max-width: 720px;
    }

    .height250 {
      height: 250px;
    }

    .my-history-dropdown-menu.q-menu[role='menu'] {
      max-width: none !important;
    }

    /* Ensure page background reflects Quasar dark mode classes even if core CSS load order changes */
    body.body--light {
      background-color: #ffffff;
      color: var(--q-dark, #2D2D2D);
    }

    body.body--dark {
      background-color: var(--q-dark, #2D2D2D);
      color: #e0e0e0;
    }
  </style>
</head>

<body>
  <!-- quasar:entry-point -->
</body>

</html>
